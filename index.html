<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Falleando by Chema Valero</title>
  <link rel="stylesheet" href="style.css">
  <!-- Leaflet -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />
  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
    defer
  ></script>

<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.Default.css" />
<script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js" defer></script>

</head>

<body>
<div id="topbar" class="topbar expanded">
  <div class="topbar-header">
    <strong>Falleando</strong>
       <button id="topbarToggle" class="topbar-toggle" aria-label="Contraer">▾</button>
  </div>
  <div id="topbarContent">
    <!-- Multi-secciones con checkboxes -->
    <div class="section-multi">
      <button id="sectionsToggleBtn" class="sections-toggle">Secciones (todas)</button>

        <div id="sectionsPanel" class="sections-panel hidden">
          <label class="sec-item">
            <input type="checkbox" id="sec_all" checked />
            <strong>Todas</strong>
          </label>
          <div id="sectionsList"></div>
       </div>
    </div>
    
  <div class="section-multi">
  <button id="sectorsToggleBtn" class="sections-toggle">Sectores (todos)</button>

  <div id="sectorsPanel" class="sections-panel hidden">
    <label class="sec-item">
      <input type="checkbox" id="sector_all" checked />
      <strong>Todas</strong>
    </label>
    <div id="sector_list"></div>
  </div>
</div>

    <div class="row">
      <input id="textFilter" placeholder="Buscar (Na Jordana, 9…)" />
    </div>

    <div class="row">
      <select id="statusFilter">
  <option value="ALL">Todas</option>
  <option value="VISITED">Visitadas</option>
  <option value="NOT_VISITED">No visitadas</option>
  <option value="WISH">Quiero ver</option>
</select>
    </div>

    <div class="hint">App creada por <a href="https://instagram.com/chemaart/" target="_blank">Chema Valero</a></div>
  </div>
</div>
  <div id="map"></div>

  <!-- Botón flotante -->
  <button id="routeToggleBtn" class="fab" title="Opciones de ruta">🧭</button>

  <!-- Panel de ruta -->
  <div id="routePanel" class="route-panel hidden">
    <div class="panel-header">
  <div class="panel-title">Ruta</div>
  <button id="routeCloseBtn" class="panel-close" aria-label="Cerrar">✕</button>
</div>


    <label for="timeMin">Tiempo disponible (min)</label>
    <input id="timeMin" type="number" min="1" max="600" value="45" />

    <label for="speedKmh">Velocidad (km/h)</label>
    <input id="speedKmh" type="number" min="2" max="10" step="0.1" value="4.5" />

    <label style="display:flex;align-items:center;gap:8px;margin-top:6px;">
      <input type="checkbox" id="ignoreVisitedChk" checked />
      Ignorar fallas visitadas
    </label>

    <div class="panel-buttons" style="margin-top:6px; flex-wrap: wrap;">
  <button id="locateBtn">📍 Mi ubicación</button>
  <button id="pickStartBtn">🎯 Elegir inicio</button>
  <button id="endGpsBtn">🏁 Fin: inicio</button>
</div>

    <div class="panel-buttons">
      <button id="routeBtn" class="primary">Crear ruta</button>
      <button id="clearRouteBtn">Borrar</button>
    </div>
  </div>

  <script src="./app.js" defer></script>
</body>
</html>
